services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gpslogger
      TZ: UTC
      PGTZ: UTC
    ports:
      # Host 5434 → container 5432 (5432/5433 are used by other local projects).
      # Internal service-to-service traffic still uses 5432 via the compose network.
      - "5434:5432"
    volumes:
      - db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gpslogger"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Daily database backup (pg_dump, retains 7 days)
  db-backup:
    image: postgres:16-alpine
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: gpslogger
    volumes:
      - db-backup:/backup
    tmpfs:
      - /var/lib/postgresql/data
    entrypoint: /bin/sh
    command: >
      -c 'while true; do
        STAMP=$$(date +%Y%m%d_%H%M%S);
        pg_dump -Fc > /backup/backup_$$STAMP.dump;
        echo "Backup created: backup_$$STAMP.dump";
        find /backup -name "backup_*.dump" -mtime +7 -delete;
        sleep 86400;
      done'
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      PORT: 3000
      PGHOST: db
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: gpslogger
      TZ: UTC
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the JS bundle at build time. The nginx config inside the
        # container proxies /api/* to the backend service on the compose network.
        VITE_API_URL: /api
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  db:
  db-backup:
