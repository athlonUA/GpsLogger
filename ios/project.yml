name: GpsLogger

options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "2"
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"

targets:
  GpsLogger:
    type: application
    platform: iOS

    sources:
      - path: GpsLogger
        excludes:
          # Reference plist; xcodegen synthesizes the real one from the
          # info.properties block below.
          - Info.plist

    info:
      path: GpsLogger/Info-generated.plist
      properties:
        CFBundleDisplayName: GpsLogger
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "2"
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSLocationAlwaysAndWhenInUseUsageDescription: "GpsLogger records your location in the background to log your trip."
        NSLocationWhenInUseUsageDescription: "GpsLogger records your current position to log your trip."
        UIBackgroundModes:
          - location
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true

    entitlements:
      path: GpsLogger/GpsLogger.entitlements
      properties: {}

    # DEVELOPMENT_TEAM is provided by the gitignored GpsLogger.xcconfig file.
    # Copy GpsLogger.xcconfig.example to GpsLogger.xcconfig and fill in your
    # team ID, then re-run `xcodegen generate` in this directory.
    configFiles:
      Debug: GpsLogger.xcconfig
      Release: GpsLogger.xcconfig

    settings:
      base:
        # "com.example.*" is blocked by Apple for free accounts — use a unique ID.
        PRODUCT_BUNDLE_IDENTIFIER: com.gpslogger.personal
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        CODE_SIGN_STYLE: Automatic

  GpsLoggerTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"

    sources:
      - path: GpsLoggerTests

    dependencies:
      - target: GpsLogger

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gpslogger.personal.tests
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        GENERATE_INFOPLIST_FILE: "YES"
