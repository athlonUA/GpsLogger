name: GpsLogger

options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.2.13"
    CURRENT_PROJECT_VERSION: "18"
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"

targets:
  GpsLogger:
    type: application
    platform: iOS

    sources:
      - path: GpsLogger
        excludes:
          # Reference plist; xcodegen synthesizes the real one from the
          # info.properties block below.
          - Info.plist

    info:
      path: GpsLogger/Info-generated.plist
      properties:
        CFBundleDisplayName: GpsLogger
        CFBundleShortVersionString: "1.2.13"
        CFBundleVersion: "18"
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSLocationAlwaysAndWhenInUseUsageDescription: "GpsLogger records your location in the background to log your trip."
        NSLocationWhenInUseUsageDescription: "GpsLogger records your current position to log your trip."
        NSMotionUsageDescription: "GpsLogger reads the motion sensors to detect whether you are walking, cycling, or in a vehicle, so it can tune CoreLocation's activityType hint for each mode. Processing happens entirely on device."
        UIBackgroundModes:
          # `location` keeps CoreLocation delivering updates while the app
          # is backgrounded (the primary data-collection path).
          # `fetch` lets `BGAppRefreshTask` wake the app to drain the
          # upload queue when CoreLocation has gone quiet (stationary
          # phone) and the foreground sync Timer is suspended.
          - location
          - fetch
        BGTaskSchedulerPermittedIdentifiers:
          # Must match `Config.backgroundRefreshTaskId`. Registered in
          # `GpsLoggerApp.init` via `BGTaskScheduler.shared.register`.
          - com.gpslogger.personal.refresh
        # ATS is scoped to **local networking only**. `NSAllowsLocalNetworking`
        # exempts private-IP ranges (10.x, 172.16.x–172.31.x, 192.168.x) and
        # `.local` hostnames from ATS so the iOS app can reach the Mac's
        # docker-compose backend over plain HTTP without the global kill
        # switch `NSAllowsArbitraryLoads = true`. Any traffic to public
        # internet addresses still goes through the full ATS enforcement
        # (HTTPS, modern TLS, valid certificate), so a malicious captive
        # portal cannot MITM unrelated requests.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        # Baked in from $(API_BASE_URL) in the gitignored xcconfig. Xcode
        # substitutes the value during ProcessInfoPlistFile, and
        # Config.apiBaseURL reads it from Bundle.main at launch. Keeps
        # personal LAN IPs out of git while producing a self-contained
        # physical-device build.
        API_BASE_URL: $(API_BASE_URL)
        API_KEY: $(API_KEY)

    entitlements:
      path: GpsLogger/GpsLogger.entitlements
      properties: {}

    # DEVELOPMENT_TEAM and API_BASE_URL are provided by the gitignored
    # GpsLogger.xcconfig file. Copy GpsLogger.xcconfig.example to
    # GpsLogger.xcconfig, fill in your team ID and your Mac's LAN IP, then
    # re-run `xcodegen generate` in this directory.
    configFiles:
      Debug: GpsLogger.xcconfig
      Release: GpsLogger.xcconfig

    settings:
      base:
        # "com.example.*" is blocked by Apple for free accounts — use a unique ID.
        PRODUCT_BUNDLE_IDENTIFIER: com.gpslogger.personal
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        CODE_SIGN_STYLE: Automatic

  GpsLoggerTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"

    sources:
      - path: GpsLoggerTests

    dependencies:
      - target: GpsLogger

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gpslogger.personal.tests
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        GENERATE_INFOPLIST_FILE: "YES"
