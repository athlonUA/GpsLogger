server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API requests are proxied to the backend service on the compose network.
    # The trailing slash on proxy_pass strips the /api/ prefix, so:
    #   GET /api/points?from=...  →  backend:3000/points?from=...
    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_pass http://backend:3000/;
    }

    # SPA fallback: unknown paths return index.html so client-side routing
    # works if it's ever added. Harmless for the current single-page UI.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
