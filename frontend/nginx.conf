server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- Security headers ---
    #
    # `always` emits the header even on 4xx/5xx responses so error pages
    # get the same protection as normal ones. Tuned for the current app:
    #   - `script-src 'self'` — we do not inline or eval scripts.
    #   - `style-src 'self' 'unsafe-inline'` — Leaflet injects inline
    #     styles at runtime (map layer positioning). Without 'unsafe-inline'
    #     tiles render in the wrong place.
    #   - `img-src` allows CARTO/OSM tile hosts (the basemap) and `data:`
    #     (Leaflet's control icons are data URIs).
    #   - `connect-src` allows Nominatim for reverse geocoding and self
    #     for the /api/* proxy.
    #   - `object-src 'none'` and `frame-ancestors 'none'` close off the
    #     two classic XSS / clickjacking pivots.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "DENY"    always;
    add_header Referrer-Policy        "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-ZWZYYjQld//u2O6Gx0kd7XF9Wwsg29QzBGNQk47qSNw='; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.basemaps.cartocdn.com https://*.openstreetmap.org https://*.tile.openstreetmap.org; font-src 'self' data:; connect-src 'self' https://nominatim.openstreetmap.org; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # API requests are proxied to the backend service on the compose network.
    # The trailing slash on proxy_pass strips the /api/ prefix, so:
    #   GET /api/points?from=...  →  backend:3000/points?from=...
    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_pass http://backend:3000/;
    }

    # SPA fallback: unknown paths return index.html so client-side routing
    # works if it's ever added. Harmless for the current single-page UI.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
